#ServerConfiguration
server.port=8084
#ApplicationName
spring.application.name=booking-service

#DatabaseConfiguration
spring.datasource.url=jdbc:mysql://localhost:3306/sparklix_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1122
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA/Hibernatesettings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#EurekaClientConfiguration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

#JWTConfigurationforVALIDATINGtokens(MUSTmatchuser-service'ssecret)
sparklix.app.jwtSecret=DefaultDevSecretKeyIsOkayForNowButChangeItLaterPlzThisIs32BytesLong!
# sparklix.app.jwtExpirationMs is not strictly needed for validation-only JwtUtil unless it has @Value for it

#Logging
logging.level.com.sparklix.bookingservice=DEBUG
logging.level.org.springframework.security=DEBUG 
logging.level.com.sparklix.bookingservice.security.jwt=DEBUG
logging.level.com.sparklix.bookingservice.util.JwtUtil=DEBUG
logging.level.com.sparklix.commons.aop.LoggingAspect=INFO